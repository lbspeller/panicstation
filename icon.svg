<!-- Save as: favicon.svg  (works well at 16/32/48px) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PanicStation favicon">
  <!-- Match site background -->
  <rect width="64" height="64" rx="14" fill="#F6F7FB"/>

  <!-- Simple “PS” monogram mark (brand name stays in header; this is just an icon) -->
  <g fill="none" stroke="#0B1220" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- P -->
    <path d="M22 46V18"/>
    <path d="M22 18h13.5c6.2 0 6.2 14 0 14H22"/>

    <!-- S (minimal, geometric, reads at small sizes) -->
    <path d="M44 22c0-3-2.5-5-6-5h-2c-3.5 0-6 2-6 5s2 5 6 5h2c3.5 0 6 2 6 5s-2.5 5-6 5h-2c-3.5 0-6-2-6-5"/>
  </g>

  <!-- .org red dot accent -->
  <circle cx="52" cy="16" r="4.2" fill="#D24B4B"/>
</svg>